name: googleCreate — Deploy Infraestrutura GCP

on:
  workflow_dispatch:
    inputs:
      rm_number:
        description: "Número de RM do aluno (ex: 562192)"
        required: true
        type: string
      gcp_project_id:
        description: "ID do projeto GCP"
        required: true
        type: string

env:
  GCP_REGION: us-east1
  GCP_ZONE:   us-east1-b
  TF_DIR:     terraform/gcp

jobs:
  terraform-gcp:
    name: "Terraform — Provisiona GCP"
    runs-on: ubuntu-latest
    outputs:
      gcp_ip: ${{ steps.outputs.outputs.gcp_ip }}

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ github.event.inputs.gcp_project_id }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="rm_number=${{ github.event.inputs.rm_number }}" \
            -var="gcp_project_id=${{ github.event.inputs.gcp_project_id }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Capturar Outputs
        id: outputs
        run: |
          echo "gcp_ip=$(terraform output -raw gcp_instance_external_ip)" >> $GITHUB_OUTPUT
          echo "firewall=$(terraform output -raw gcp_firewall_name)" >> $GITHUB_OUTPUT

      - name: Resumo do Deploy
        run: |
          echo "## ✅ GCP Deploy Concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Recurso | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Compute Engine IP | ${{ steps.outputs.outputs.gcp_ip }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firewall Rule | ${{ steps.outputs.outputs.firewall }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **⚠️ Próximo passo:** copie o **Compute Engine IP** acima e informe como \`gcp_site_ip\` ao rodar o pipeline **awsCreate**." >> $GITHUB_STEP_SUMMARY

  health-check:
    name: "Verificar Site GCP"
    runs-on: ubuntu-latest
    needs: terraform-gcp

    steps:
      - name: Aguardar startup script do GCP
        run: sleep 120

      - name: Testar HTTP no site GCP
        run: |
          GCP_IP="${{ needs.terraform-gcp.outputs.gcp_ip }}"
          echo "Testando http://${GCP_IP}..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${GCP_IP}" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backup GCP respondendo com HTTP 200"
          else
            echo "⚠️  Backup GCP retornou status: $STATUS"
          fi
